views:
- type: sections
  sections:
  - type: grid
    cards:
    - type: heading
      heading_style: title
      heading: P1S
    - type: vertical-stack
      cards:
      - type: picture-entity
        entity: camera.p1s_01p00c5b0700699_camera
        camera_view: live
        show_state: false
        show_name: false
      - type: markdown
        content: "## 🖨️ {{ states('sensor.p1s_01p00c5b0700699_printer_name') }}\n**Status:** {{ states('sensor.p1s_01p00c5b0700699_print_status') | replace('_', ' ') | title -}} {% if states('binary_sensor.p1s_01p00c5b0700699_online') == 'on' %} &nbsp;🟢 Online{% else %} &nbsp;🔴 Offline{% endif %}\n{%- set task = states('sensor.p1s_01p00c5b0700699_task_name') %} {%- if task not in ['unavailable', 'unknown', 'none', ''] %}\n**Job:** {{ task }} {%- endif %}\n**Progress:** {{ states('sensor.p1s_01p00c5b0700699_print_progress') }}% &nbsp;·&nbsp; Layer {{ states('sensor.p1s_01p00c5b0700699_current_layer') }}/{{ states('sensor.p1s_01p00c5b0700699_total_layer_count') }} &nbsp;·&nbsp; {{ states('sensor.p1s_01p00c5b0700699_speed_profile') | title }}\n"
      - type: gauge
        entity: sensor.p1s_01p00c5b0700699_print_progress
        name: Progress
        min: 0
        max: 100
        needle: false
      - type: markdown
        content: "{%- set rem = states('sensor.p1s_01p00c5b0700699_remaining_time') | float(-1) %} {%- set status = states('sensor.p1s_01p00c5b0700699_print_status') %} {%- if status == 'finish' %} # ✅ Print Complete {%- elif status in ['running', 'pause'] and rem >= 0 %} {%- set total_min = (rem * 60 + 0.5) | int %} {%- set h = total_min // 60 %} {%- set m = total_min % 60 %} # ⏱ {{ '%02d:%02d' | format(h, m) }} remaining {%- elif status == 'pause' %} # ⏸ Paused {%- else %} # — Idle {%- endif %}\n"
      - type: horizontal-stack
        cards:
        - type: gauge
          entity: sensor.p1s_01p00c5b0700699_nozzle_temperature
          name: Nozzle
          min: 0
          max: 300
          needle: true
        - type: gauge
          entity: sensor.p1s_01p00c5b0700699_bed_temperature
          name: Bed
          min: 0
          max: 120
          needle: true
      - type: entities
        title: AMS Filament
        show_header_toggle: false
        entities:
        - entity: sensor.p1s_01p00c5b0700699_ams_1_tray_1
          name: Tray 1
          icon: mdi:spool
        - entity: sensor.p1s_01p00c5b0700699_ams_1_tray_2
          name: Tray 2
          icon: mdi:spool
        - entity: sensor.p1s_01p00c5b0700699_ams_1_tray_3
          name: Tray 3
          icon: mdi:spool
        - entity: sensor.p1s_01p00c5b0700699_ams_1_tray_4
          name: Tray 4
          icon: mdi:spool
        - entity: sensor.p1s_01p00c5b0700699_active_tray
          name: Active Tray
          icon: mdi:printer-3d-nozzle
        - type: divider
        - entity: sensor.p1s_01p00c5b0700699_ams_1_temperature
          name: AMS Temp
          icon: mdi:thermometer
        - entity: sensor.p1s_01p00c5b0700699_ams_1_humidity
          name: AMS Humidity
          icon: mdi:water-percent
      - type: horizontal-stack
        cards:
        - type: button
          entity: button.p1s_01p00c5b0700699_pause
          name: Pause
          icon: mdi:pause-circle
          tap_action:
            action: perform-action
            perform_action: button.press
            target:
              entity_id: button.p1s_01p00c5b0700699_pause
        - type: button
          entity: button.p1s_01p00c5b0700699_resume
          name: Resume
          icon: mdi:play-circle
          tap_action:
            action: perform-action
            perform_action: button.press
            target:
              entity_id: button.p1s_01p00c5b0700699_resume
        - type: button
          entity: button.p1s_01p00c5b0700699_stop
          name: Stop
          icon: mdi:stop-circle
          tap_action:
            action: perform-action
            perform_action: button.press
            target:
              entity_id: button.p1s_01p00c5b0700699_stop
      - type: horizontal-stack
        cards:
        - type: tile
          entity: light.p1s_01p00c5b0700699_chamber_light
          name: Chamber Light
          icon: mdi:lightbulb
        - type: tile
          entity: switch.p1s_01p00c5b0700699_camera
          name: Camera Stream
          icon: mdi:cctv
        - type: button
          entity: button.p1s_01p00c5b0700699_force_refresh
          name: Refresh
          icon: mdi:refresh
          tap_action:
            action: perform-action
            perform_action: button.press
            target:
              entity_id: button.p1s_01p00c5b0700699_force_refresh
      - type: entities
        title: Diagnostics
        show_header_toggle: false
        entities:
        - entity: binary_sensor.p1s_01p00c5b0700699_hms_errors
          name: HMS Errors
        - entity: binary_sensor.p1s_01p00c5b0700699_print_error
          name: Print Error
        - entity: binary_sensor.p1s_01p00c5b0700699_firmware
          name: Firmware Update
        - entity: sensor.p1s_01p00c5b0700699_nozzle_size
          name: Nozzle Size
        - entity: sensor.p1s_01p00c5b0700699_nozzle_type
          name: Nozzle Type
        - entity: sensor.p1s_01p00c5b0700699_print_bed_type
          name: Bed Plate
        - entity: sensor.p1s_01p00c5b0700699_wi_fi_signal
          name: Wi-Fi Signal
        - entity: sensor.p1s_01p00c5b0700699_sd_card_status
          name: SD Card
        - entity: sensor.p1s_01p00c5b0700699_print_weight
          name: Last Print Weight
        - entity: sensor.p1s_01p00c5b0700699_print_length
          name: Last Print Length
