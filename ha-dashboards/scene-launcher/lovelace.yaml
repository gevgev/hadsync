title: Scene Launcher
views:
- title: Scene Launcher
  icon: mdi:palette
  type: custom:grid-layout
  layout:
    grid-template-columns: minmax(0, 500px)
    justify-content: center
  cards:
  - type: markdown
    content: "## 💡 Gev's Room"
  - type: horizontal-stack
    cards:
    - type: custom:button-card
      entity: scene.living_room_relax
      name: Relax
      icon: mdi:sofa
      show_state: false
      tap_action:
        action: toggle
      styles:
        icon:
        - color: orange
    - type: custom:button-card
      entity: scene.living_room_read
      name: Read
      icon: mdi:book-open
      show_state: false
      tap_action:
        action: toggle
      styles:
        icon:
        - color: gold
    - type: custom:button-card
      entity: scene.living_room_concentrate
      name: Concentrate
      icon: mdi:brain
      show_state: false
      tap_action:
        action: toggle
      styles:
        icon:
        - color: royalblue
  - type: horizontal-stack
    cards:
    - type: custom:button-card
      entity: scene.living_room_energize
      name: Energize
      icon: mdi:lightning-bolt
      show_state: false
      tap_action:
        action: toggle
