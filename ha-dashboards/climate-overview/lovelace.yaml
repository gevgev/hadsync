      name: PM1.0
    - entity: sensor.particulate_matter_2_5um_concentration_3
      name: PM2.5
    - entity: sensor.particulate_matter_10_0um_concentration_3
      name: PM10
    - entity: sensor.air_quality_meter_temperature
      name: Temp
    - entity: sensor.air_quality_meter_humidity
      name: Humidity
