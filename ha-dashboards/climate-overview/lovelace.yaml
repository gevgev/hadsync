title: Climate Overview
views:
- title: Overview
  icon: mdi:home-thermometer
  layout:
    grid-template-columns: minmax(0, 500px)
    justify-content: center
  cards:
  - type: weather-forecast
    entity: weather.forecast_home
    forecast_type: daily
  - type: glance
    title: 🌡️ Indoor Temperatures
    entities:
    - entity: sensor.meter_living_room_temperature
      name: Living Room
    - entity: sensor.meter_plus_kitchen_3264_temperature
      name: Kitchen
    - entity: sensor.meter_dining_room_temperature
      name: Dining Room
    - entity: sensor.meter_hallway_temperature
      name: Hallway
    - entity: sensor.meter_master_bedroom_temperature
      name: Master Bed
    - entity: sensor.meter_aram_temperature
      name: Aram
    - entity: sensor.meter_nane_temperature
      name: Nane
  - type: glance
    title: 💧 Indoor Humidity
    entities:
    - entity: sensor.meter_living_room_humidity
      name: Living Room
    - entity: sensor.meter_plus_kitchen_3264_humidity
      name: Kitchen
    - entity: sensor.meter_dining_room_humidity
      name: Dining Room
    - entity: sensor.meter_hallway_humidity
      name: Hallway
    - entity: sensor.meter_master_bedroom_humidity
      name: Master Bed
    - entity: sensor.meter_aram_humidity
      name: Aram
    - entity: sensor.meter_nane_humidity
      name: Nane
  - type: glance
    title: 🌿 Special Areas
    entities:
    - entity: sensor.meter_patio_temperature
      name: Patio 🌡️
    - entity: sensor.meter_patio_humidity
      name: Patio 💧
    - entity: sensor.meter_wine_cooler_down_temperature
      name: Wine Down
    - entity: sensor.meter_wine_cooler_up_temperature
      name: Wine Up
    - entity: sensor.freezer_meter_temperature
      name: Freezer
- title: 1st Floor
  icon: mdi:numeric-1-box-outline
  cards:
