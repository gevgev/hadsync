views:
- title: Home
  cards:
  - type: grid
    square: false
    columns: 2
    cards:
    - show_state: true
      show_name: true
      camera_view: live
      fit_mode: cover
      type: picture-entity
      entity: camera.kitchen
    - show_state: true
      show_name: true
      camera_view: live
      fit_mode: cover
      type: picture-entity
      entity: camera.widecamera_mywidecamera
    - show_state: true
      show_name: true
      camera_view: live
      fit_mode: cover
      type: picture-entity
      entity: camera.ocamera
    - show_state: true
      show_name: true
      camera_view: live
      fit_mode: cover
      type: picture-entity
      entity: camera.widecamera_2_mywidecamera_2
    - show_state: true
      show_name: true
      camera_view: live
      fit_mode: cover
      type: picture-entity
      entity: camera.cam_living_room_1
    - show_state: true
      show_name: true
      camera_view: live
      fit_mode: cover
      type: picture-entity
      entity: camera.cam_dining_room_1
    - show_state: true
      show_name: true
      type: custom:webrtc-camera
      entity: camera.doorbell
      poster: image.entrance_event_image
      ui: true
      shortcuts:
      - name: Play
        icon: mdi:play
        service: camera.turn_on
        service_data:
          entity_id: camera.doorbell
      - name: Stop
        icon: mdi:stop
        service: camera.turn_off
        service_data:
          entity_id: camera.doorbell
  - type: grid
    square: false
    columns: 3
    cards:
    - type: vertical-stack
      cards:
      - type: custom:mushroom-number-card
        entity: number.step_motor_1_stepper_1_position
        name: Stepper 1 Position
      - type: custom:mushroom-entity-card
        entity: sensor.step_motor_1_stepper_1_current_position
        name: Stepper 1 Actual
    - type: vertical-stack
      cards:
      - type: custom:mushroom-number-card
        entity: number.step_motor_2_stepper_2_position
        name: Stepper 2 Position
      - type: custom:mushroom-entity-card
        entity: sensor.step_motor_2_stepper_2_current_position
        name: Stepper 2 Actual
    - type: vertical-stack
      cards:
      - type: custom:mushroom-number-card
        entity: number.step_motor_3_stepper_3_position
        name: Stepper 3 Position
      - type: custom:mushroom-entity-card
        entity: sensor.step_motor_3_stepper_3_current_position
        name: Stepper 3 Actual
  - type: picture-glance
    title: Ha-yi-camera-26
    camera_image: camera.ha_yi_camera_26_profile_0
    camera_view: live
    entities:
    - entity: binary_sensor.ha_yi_camera_26_detected_sound
      name: Sound
    - entity: binary_sensor.ha_yi_camera_26_motion_alarm
      name: Motion
    - entity: binary_sensor.ha_yi_camera_26_person_detection
      name: Person
    - entity: binary_sensor.ha_yi_camera_26_pet_detection
      name: Pet
    - entity: binary_sensor.ha_yi_camera_26_vehicle_detection
      name: Vehicle
  - type: picture-glance
    title: Yi-6a04
    camera_image: camera.yi_6a04_profile_0
    camera_view: live
    entities:
    - entity: binary_sensor.yi_6a04_detected_sound
      name: Sound
    - entity: binary_sensor.yi_6a04_motion_alarm
      name: Motion
    - entity: binary_sensor.yi_6a04_person_detection
      name: Person
    - entity: binary_sensor.yi_6a04_pet_detection
      name: Pet
    - entity: binary_sensor.yi_6a04_vehicle_detection
      name: Vehicle
