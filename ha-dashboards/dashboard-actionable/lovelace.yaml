title: Actionable
views:
- title: Actionable
  icon: mdi:lightning-bolt
  type: custom:grid-layout
  layout:
    grid-template-columns: minmax(0, 700px)
    justify-content: center
  cards:
  - type: horizontal-stack
    cards:
    - type: vertical-stack
      cards:
      - type: entities
        title: 🌡️ Nest Thermostat
        entities:
        - type: attribute
          entity: climate.living_room
          attribute: hvac_action
        - entity: sensor.nest_active_sensor
          name: Active Sensor
          icon: mdi:home-thermometer-outline
        - entity: sensor.living_room_temperature
          name: Temperature
        - type: attribute
          entity: climate.living_room
          attribute: current_humidity
          name: Humidity
      - type: thermostat
        entity: climate.living_room
    - type: vertical-stack
      cards:
      - type: entities
        title: 🌡️ Quick Temps
        entities:
        - entity: sensor.living_room_temperature
          name: Living Room
        - entity: sensor.meter_master_bedroom_temperature
          name: Master Bed
        - entity: sensor.meter_plus_kitchen_3264_temperature
          name: Kitchen
        - entity: sensor.meter_patio_temperature
          name: Patio Shade
        - entity: sensor.meter_kitchen_temperature
          name: Patio Sun
      - type: markdown
        content: '### 💡 Quick Scenes'
      - type: horizontal-stack
        cards:
        - type: custom:button-card
          entity: scene.living_room_relax
          name: Relax
          icon: mdi:sofa
          styles:
            icon:
            - color: orange
          show_state: false
          tap_action:
            action: toggle
        - type: custom:button-card
          entity: scene.living_room_read
          name: Read
          icon: mdi:book-open
          styles:
            icon:
            - color: yellow
          show_state: false
          tap_action:
            action: toggle
        - type: custom:button-card
          entity: scene.living_room_nightlight
          name: Nightlight
          icon: mdi:weather-night
          styles:
            icon:
            - color: purple
          show_state: false
          tap_action:
            action: toggle
      - type: horizontal-stack
        cards:
        - type: custom:button-card
          entity: scene.living_room_energize
          name: Energize
          icon: mdi:lightning-bolt
          styles:
            icon:
            - color: cyan
          show_state: false
          tap_action:
            action: toggle
        - type: custom:button-card
          entity: scene.gevs_room_fuchsia_frost
          name: Fuschia
          icon: mdi:flower
          styles:
            icon:
            - color: pink
          show_state: false
          tap_action:
            action: toggle
        - type: custom:button-card
          entity: scene.living_room_arctic_aurora
          name: Aurora
          icon: mdi:shimmer
          styles:
            icon:
            - color: teal
          show_state: false
          tap_action:
            action: toggle
      - type: horizontal-stack
        cards:
        - type: custom:button-card
          entity: scene.living_room_vapor_wave
          name: Vapor Wave
          icon: mdi:sine-wave
          styles:
            icon:
            - color: hotpink
          show_state: false
          tap_action:
            action: toggle
        - type: custom:button-card
          entity: scene.living_room_autumn_gold
          name: Autumn Gold
          icon: mdi:leaf
          styles:
            icon:
            - color: goldenrod
          show_state: false
          tap_action:
            action: toggle
        - type: custom:button-card
          entity: scene.living_room_rolling_hills
          name: Rolling Hills
          icon: mdi:terrain
          styles:
            icon:
            - color: forestgreen
          show_state: false
          tap_action:
            action: toggle
  - type: horizontal-stack
    cards:
    - type: entities
      title: 👥 People
      entities:
      - entity: person.gevorg_gevorgyan
        name: Gevorg
      - entity: person.anna_mamalashvili
        name: Anna
    - type: entities
      title: 🔐 Front Door
      entities:
      - entity: lock.front_door
        name: Lock
      - entity: binary_sensor.front_door_open
        name: Door
      - entity: sensor.front_door_battery
        name: Battery
      - entity: sensor.front_door_operator
        name: Mode
  - type: media-control
    entity: media_player.sony_xbr_65x850e
  - type: media-control
    entity: media_player.sony_kd_43x85k
  - type: media-control
    entity: media_player.samsung_5_series_40
  - type: media-control
    entity: media_player.living_room
  - type: media-control
    entity: media_player.bedroom_roku_3
  - type: media-control
    entity: media_player.living_room_roku
