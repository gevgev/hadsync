name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.3)"
        required: true

permissions:
  contents: write  # needed to create GitHub Releases

jobs:
  publish-python:
    name: Publish Python package to PyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: uv sync --extra dev && uv run pytest --tb=short

      - name: Build distribution
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          skip_existing: true

  package-vscode:
    name: Build VS Code extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: vscode-hadsync

      - name: Compile TypeScript
        run: npm run compile
        working-directory: vscode-hadsync

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies
        working-directory: vscode-hadsync

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: hadsync-vsix
          path: vscode-hadsync/*.vsix

  # To publish to the VS Code Marketplace manually after a release:
  #   cd vscode-hadsync
  #   npx @vscode/vsce publish --no-dependencies --pat <your-token>

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-python, package-vscode]

    steps:
      - uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: hadsync-vsix
          path: dist-vsix

      - name: Extract changelog entry for this version
        id: changelog
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${REF#v}"
          NOTES=$(awk "/^## \[v?${VERSION}\]/{found=1; next} found && /^---/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: dist-vsix/*.vsix
